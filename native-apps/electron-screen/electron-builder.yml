appId: com.theopenpresenter.desktop-universal
productName: TheOpenPresenterScreen
executableName: theopenpresenter-screen
directories:
  buildResources: packaging
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/koffi/**
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
linux:
  target:
    - AppImage
    - deb
    - rpm
    - pacman
    - tar.gz
  category: Office
  desktop:
    entry:
      Name: TheOpenPresenter Screen
# The chrome-sandbox SUID fix is needed for every package type that installs the
# unpacked app to /opt (deb, rpm, pacman). AppImage and tar.gz are not installed
# by a package manager, so they have no post-install hook.
deb:
  afterInstall: packaging/postinst.sh
  afterRemove: packaging/postrm.sh
rpm:
  afterInstall: packaging/postinst.sh
  afterRemove: packaging/postrm.sh
pacman:
  afterInstall: packaging/postinst.sh
  afterRemove: packaging/postrm.sh
win:
  target:
    - nsis
