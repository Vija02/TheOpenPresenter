query RemoteBasePlugin($orgSlug: String!, $projectSlug: String!) {
  pluginMeta {
    ...BaseRemotePluginMeta
  }

  currentUser {
    id
    name
    primaryEmail
  }

  organizationBySlug(slug: $orgSlug) {
    id
    projects(condition: { slug: $projectSlug }) {
      nodes {
        id
        name
        isPublic
      }
    }
  }

  publicProject: projects(condition: { slug: $projectSlug, isPublic: true }) {
    nodes {
      id
      name
      isPublic
      organizationId
    }
  }
}

fragment BaseRemotePluginMeta on PluginMeta {
  sceneCreator {
    title
    pluginName
    description
    categories
    isExperimental
    isStarred
  }
  registeredRemoteView {
    pluginName
    tag
    config {
      alwaysRender
    }
  }
}
