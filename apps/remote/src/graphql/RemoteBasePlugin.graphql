query RemoteBasePlugin($orgSlug: String!, $projectSlug: String!) {
  pluginMeta {
    ...BaseRemotePluginMeta
  }

  currentUser {
    id
    name
    primaryEmail
  }

  organizationBySlug(slug: $orgSlug) {
    id
    organizationType
    experimentalFeaturesEnabled
    projects(condition: { slug: $projectSlug }) {
      nodes {
        id
        name
        isPublic
      }
    }
  }

  publicOrGuestProject: projects(condition: { slug: $projectSlug }) {
    nodes {
      id
      name
      isPublic
      organizationId
    }
  }

  currentScreenGuestSession {
    id
    screen {
      id
      slug
      organization {
        id
        slug
      }
      screenActiveController {
        screenGuestSessionId
      }
    }
  }
}

fragment BaseRemotePluginMeta on PluginMeta {
  sceneCreator {
    title
    pluginName
    description
    categories
    organizationTypes
    isExperimental
    isStarred
  }
  registeredRemoteView {
    pluginName
    tag
    config {
      alwaysRender
    }
  }
}
