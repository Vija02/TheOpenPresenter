mutation UpdateProject(
  $id: UUID!
  $name: String
  $slug: String
  $targetDate: Datetime
  $categoryId: UUID
  $isPublic: Boolean
) {
  updateProject(
    input: {
      id: $id
      patch: {
        name: $name
        slug: $slug
        targetDate: $targetDate
        categoryId: $categoryId
        isPublic: $isPublic
      }
    }
  ) {
    project {
      id
    }
  }
}
