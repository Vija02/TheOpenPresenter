fragment ScreenControlRequest on ScreenControlRequest {
  id
  screenId
  screenGuestSessionId
  screenGuestSession {
    id
    kind
    displayName
  }
  requestType
  status
  note
  resolvedAt
  resolvedByUserId
  resolvedByUser {
    id
    username
    name
  }
  createdAt
  screen {
    id
    name
    slug
    anonGuestOnTakeoverPolicy
    anonGuestOnTakeoverAfterSeconds
    registeredGuestOnTakeoverPolicy
    registeredGuestOnTakeoverAfterSeconds
  }
}
