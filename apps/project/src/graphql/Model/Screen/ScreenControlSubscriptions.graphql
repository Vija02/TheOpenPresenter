subscription ScreenActiveControllerUpdated($screenId: UUID!) {
  screenActiveControllerUpdated(screenId: $screenId) {
    event
    activeController {
      screenId
      ...ScreenActiveController
    }
  }
}

subscription AdminScreenUpdated($screenId: UUID!) {
  screenUpdated(screenId: $screenId) {
    event
    screen {
      id
      ...Screen
    }
  }
}

subscription ScreenControlRequestUpdated($requestId: UUID!) {
  screenControlRequestUpdated(requestId: $requestId) {
    event
    request {
      id
      ...ScreenControlRequest
    }
  }
}

subscription ScreenControlRequestsUpdated($screenId: UUID!) {
  screenControlRequestsUpdated(screenId: $screenId) {
    event
    request {
      id
      ...ScreenControlRequest
    }
  }
}

subscription OrganizationPendingScreenControlRequestsUpdated($organizationId: UUID!) {
  organizationPendingScreenControlRequestsUpdated(organizationId: $organizationId) {
    event
    request {
      id
      ...ScreenControlRequest
    }
  }
}
