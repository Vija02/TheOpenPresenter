fragment CreatedOrganization on Organization {
  id
  name
  slug
}

mutation CreateOrganization(
  $name: String!
  $slug: String!
  $organizationType: OrganizationType
) {
  createOrganization(
    input: {
      name: $name
      slug: $slug
      organizationType: $organizationType
    }
  ) {
    organization {
      id
      ...CreatedOrganization
    }
    query {
      organizationBySlug(slug: $slug) {
        id
        ...CreatedOrganization
      }
    }
  }
}
