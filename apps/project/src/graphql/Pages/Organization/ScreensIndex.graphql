query OrganizationScreensIndexPage($slug: String!) {
  ...SharedOrganization

  organizationBySlug(slug: $slug) {
    id
    screens(orderBy: [NAME_ASC]) {
      nodes {
        id
        ...Screen
      }
    }
    projects(orderBy: [TARGET_DATE_DESC, UPDATED_AT_DESC]) {
      nodes {
        id
        name
        slug
        targetDate
        createdAt
      }
    }
  }
}
