query OrganizationCloudIndexPage($slug: String!) {
  ...SharedOrganization

  organizationBySlug(slug: $slug) {
    id
    cloudConnections {
      nodes {
        id
        host
        syncAll
        organizationList
        targetOrganizationSlug
        sessionCookieExpiry
        cloudSyncRuns(orderBy: CREATED_AT_DESC, first: 1) {
          nodes {
            id
            status
            forceResync
            totalProjects
            projectsToSync
            syncedProjects
            addedProjects
            updatedProjects
            failedProjects
            projectsToDelete
            deletedProjects
            mediaStatus
            totalMedia
            syncedMedia
            totalBytes
            downloadedBytes
            error
            startedAt
            completedAt
            createdAt
          }
        }
      }
    }
  }
}
