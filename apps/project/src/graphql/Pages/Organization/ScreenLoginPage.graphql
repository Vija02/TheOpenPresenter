query ScreenLoginPage($orgSlug: String!, $screenSlug: String!) {
  ...SharedLayout_Query

  currentScreenGuestSessionId
  currentScreenGuestSession {
    id
    screenId
  }

  screenLoginMetadata(pOrgSlug: $orgSlug, pScreenSlug: $screenSlug) {
    organizationId
    organizationName
    organizationSlug
    screenId
    screenName
    screenSlug
    allowsAnon
    allowsRegistered
  }
}
