query OrganizationScreenControlIndexPage(
  $slug: String!
  $screenSlug: String!
) {
  ...SharedOrganization

  currentScreenGuestSessionId
  currentScreenGuestSession {
    id
    kind
  }

  organizationBySlug(slug: $slug) {
    id
    name
    screens(condition: { slug: $screenSlug }) {
      nodes {
        id
        ...Screen
        screenActiveController {
          screenId
          ...ScreenActiveController
        }
      }
    }
    projects(orderBy: [TARGET_DATE_DESC, UPDATED_AT_DESC]) {
      nodes {
        id
        ...Project
      }
    }
  }
}
