query OrganizationScreenControlIndexPage(
  $slug: String!
  $screenSlug: String!
) {
  ...SharedScreenGuest

  organizationBySlug(slug: $slug) {
    id
    name
    screens(condition: { slug: $screenSlug }) {
      nodes {
        id
        ...Screen
        screenActiveController {
          screenId
          ...ScreenActiveController
        }
      }
    }
    categories {
      nodes {
        id
        ...Category
      }
    }
  }

  # Cross-org project picker for the controller
  currentUser {
    id
    organizationMemberships(first: 20) {
      nodes {
        id
        organization {
          id
          name
          slug
          projects(
            condition: { isTemporary: false }
            orderBy: [TARGET_DATE_DESC, UPDATED_AT_DESC]
          ) {
            nodes {
              id
              ...Project
            }
          }
          categories {
            nodes {
              id
              ...Category
            }
          }
        }
      }
    }
  }
}
