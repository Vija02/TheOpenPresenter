mutation Register(
  $username: String!
  $password: String!
  $email: String!
  $name: String
  $turnstileToken: String
) {
  register(
    input: {
      username: $username
      password: $password
      email: $email
      name: $name
      turnstileToken: $turnstileToken
    }
  ) {
    user {
      id
      username
      name
    }
  }
}
