query RendererScreen($orgSlug: String!, $screenSlug: String!) {
  organizationBySlug(slug: $orgSlug) {
    id
    slug
    screens(condition: { slug: $screenSlug }) {
      nodes {
        id
        name
        slug
        currentProjectId
        currentRendererId
        idlePolicy
        idleAfterSeconds
        unassignAfterIdleSeconds
        showBarOnIdle
        currentProject {
          id
          slug
          name
        }
        screenActiveController {
          screenId
          screenGuestSession {
            id
            lastSeenAt
          }
        }
      }
    }
  }
}

subscription ScreenUpdated($screenId: UUID!) {
  screenUpdated(screenId: $screenId) {
    event
    screen {
      id
      currentProjectId
      currentRendererId
      idlePolicy
      idleAfterSeconds
      unassignAfterIdleSeconds
      showBarOnIdle
      currentProject {
        id
        slug
        name
      }
    }
  }
}

subscription RendererScreenActiveControllerUpdated($screenId: UUID!) {
  screenActiveControllerUpdated(screenId: $screenId) {
    event
    activeController {
      screenId
      screenGuestSession {
        id
        lastSeenAt
      }
    }
  }
}
