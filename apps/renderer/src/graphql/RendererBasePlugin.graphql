query RendererBasePlugin($orgSlug: String!, $projectSlug: String!) {
  pluginMeta {
    ...BaseRendererPluginMeta
  }

  currentUser {
    id
    name
    primaryEmail
  }

  organizationBySlug(slug: $orgSlug) {
    id
    organizationType
    projects(condition: { slug: $projectSlug }) {
      nodes {
        id
        name
        isPublic
      }
    }
  }

  publicOrGuestProject: projects(condition: { slug: $projectSlug }) {
    nodes {
      id
      name
      isPublic
      organizationId
    }
  }
}

fragment BaseRendererPluginMeta on PluginMeta {
  sceneCreator {
    title
    pluginName
    organizationTypes
  }
  registeredRendererView {
    pluginName
    tag
  }
}
