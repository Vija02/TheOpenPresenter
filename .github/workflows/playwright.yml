name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    env:
      CI: true
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    services:
      postgres:
        image: ghcr.io/vija02/theopenpresenter_db:main
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - "0.0.0.0:5432:5432"
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - "0.0.0.0:6379:6379"
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Start Alloy with config
        run: |
          docker run -d \
            --name alloy \
            --network host \
            -v ${{ github.workspace }}/config/alloy/minimal.alloy:/etc/alloy/config.alloy \
            -e LOKI_HOST="${{ secrets.LOKI_HOST }}" \
            -e LOKI_AUTH="${{ secrets.LOKI_AUTH }}" \
            -e TEMPO_HOST="${{ secrets.TEMPO_HOST }}" \
            -e TEMPO_AUTH="${{ secrets.TEMPO_AUTH }}" \
            grafana/alloy:v1.5.1 \
            run /etc/alloy/config.alloy \
            --storage.path=/var/lib/alloy/data \
            --server.http.listen-addr=0.0.0.0:12345 \
            --stability.level=experimental
      - name: Install dumbpipe
        run: |
          curl -sL https://www.dumbpipe.dev/install.sh | sh
          sudo mv dumbpipe /usr/local/bin/
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
      - name: yarn, lint, build and test
        run: |
          cp .env.ci .env
          # Setup Cloudflared (Tunnel for testing PPT)
          cloudflared tunnel --url http://localhost:5678 > /tmp/cloudflared.log 2>&1 &
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          if [ -z "$TUNNEL_URL" ]; then echo "Failed to obtain cloudflared URL"; cat /tmp/cloudflared.log; exit 1; fi
          echo "Public ROOT_URL: $TUNNEL_URL"
          sed -i "s|^ROOT_URL=.*|ROOT_URL=$TUNNEL_URL|" .env

          yarn --no-immutable
          CONFIRM_DROP=1 yarn setup
          yarn build
          yarn e2e playwright install --with-deps
          yarn worker start &
          yarn e2e test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: e2e/blob-report/
          retention-days: 1

  merge-reports:
    # Merge the per-shard blob reports into a single HTML report.
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: yarn --no-immutable
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML report
        run: yarn e2e playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
