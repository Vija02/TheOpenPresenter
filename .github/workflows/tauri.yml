name: Run Tauri Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          # - platform: 'macos-15-intel'
          #   args: '--target x86_64-apple-darwin'
          #   rust_targets: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
          cache-dependency-path: |
            yarn.lock
            tauri/yarn.lock
            tauri/node-server/yarn.lock
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
          
      - name: yarn, lint, build and test (signed)
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Build TOP
          cp .env.ci .env
          yarn --no-immutable
          yarn build

          # Reduce size
          node scripts/build_utils/extract_core.js
          node scripts/build_utils/extract_server.js
          node scripts/build_utils/extract_plugins.js
          node scripts/build_utils/extract_tauri.js
          node scripts/build_utils/copy_deps.js

          # Move the node_modules
          rm -rf node_modules
          cp -r ./node_modules_nft/node_modules ./node_modules

          # Cleanup
          rm -rf node_modules_nft

          cd tauri
          yarn --no-immutable

          yarn prebuild
          yarn tauri build --verbose

          echo "tauri_path=$(pwd)" >> "$GITHUB_ENV"

      - name: yarn, lint, build and test (unsigned)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: |
          # Build TOP
          cp .env.ci .env
          yarn --no-immutable
          yarn build

          # Reduce size
          node scripts/build_utils/extract_core.js
          node scripts/build_utils/extract_server.js
          node scripts/build_utils/extract_plugins.js
          node scripts/build_utils/extract_tauri.js
          node scripts/build_utils/copy_deps.js

          # Move the node_modules
          rm -rf node_modules
          cp -r ./node_modules_nft/node_modules ./node_modules

          # Cleanup
          rm -rf node_modules_nft

          cd tauri
          yarn --no-immutable

          yarn prebuild
          yarn tauri build --verbose

          echo "tauri_path=$(pwd)" >> "$GITHUB_ENV"

      # Tauri's built-in signing handles Contents/MacOS/* + the outer .app
      # only. This bundle ships many native binaries inside
      # Contents/Resources/ (node_modules from node-server, plus
      # @embedded-postgres / sharp / better-sqlite3 / ffmpeg-static /
      # esbuild / fsevents) — every one of those must be code-signed
      # with hardened runtime + secure timestamp + our entitlements for
      # notarisation to accept the bundle.
      #
      # So: walk every Mach-O in Resources/, sign it, then re-sign the
      # outer .app (its signature was invalidated by the Resources
      # changes), then submit to notarytool and staple. Finally rebuild
      # the DMG from the now-stapled .app so the .dmg artifact contains
      # the production-ready bundle.
      - name: Deep-sign bundle resources + notarise (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        shell: bash
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          APP="tauri/target/release/bundle/macos/TheOpenPresenter Studio.app"
          ENT="tauri/entitlements.plist"

          if [ ! -d "$APP" ]; then
            echo "Bundle not found at $APP - nothing to sign."
            exit 0
          fi

          # Tauri's auto-sign step uses an ephemeral keychain and deletes
          # it on exit. Set up a fresh one for our deep-sign + DMG signing.
          KEY_PASS=$(openssl rand -base64 12)
          KEYCHAIN="$HOME/Library/Keychains/deep-sign.keychain-db"
          security create-keychain -p "$KEY_PASS" "$KEYCHAIN"
          security unlock-keychain -p "$KEY_PASS" "$KEYCHAIN"

          CERT_FILE="$(mktemp).p12"
          echo "$APPLE_CERTIFICATE" | tr -d '[:space:]' | base64 -D > "$CERT_FILE"
          security import "$CERT_FILE" \
            -f pkcs12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -k "$KEYCHAIN"
          rm "$CERT_FILE"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KEY_PASS" "$KEYCHAIN"
          security list-keychain -d user -s \
            "$HOME/Library/Keychains/login.keychain-db" "$KEYCHAIN"

          echo "::group::Deep-signing Mach-O binaries in Contents/Resources/"
          # find ... -print0 + read -d '' to survive paths with spaces.
          while IFS= read -r -d '' f; do
            if file "$f" | grep -qE 'Mach-O'; then
              echo "  $f"
              codesign --force --options runtime --timestamp \
                --entitlements "$ENT" \
                --keychain "$KEYCHAIN" \
                --sign "$APPLE_SIGNING_IDENTITY" "$f"
            fi
          done < <(find "$APP/Contents/Resources" -type f -print0)
          echo "::endgroup::"

          echo "Re-signing outer .app (Resources changes invalidated its sig)..."
          codesign --force --options runtime --timestamp \
            --entitlements "$ENT" \
            --keychain "$KEYCHAIN" \
            --sign "$APPLE_SIGNING_IDENTITY" "$APP"

          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "Notarising .app (Apple usually takes 5–15 min)..."
          ZIP="$(mktemp -u).zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          rm -f "$ZIP"

          echo "Stapling ticket onto .app..."
          xcrun stapler staple "$APP"

          # Rebuild the DMG — the one Tauri produced contains the
          # pre-deep-sign, pre-staple .app.
          DMG_DIR="tauri/target/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          EXISTING_DMG=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1 || true)
          if [ -n "${EXISTING_DMG:-}" ]; then
            DMG_NAME="$EXISTING_DMG"
            rm -f "$EXISTING_DMG"
          else
            DMG_NAME="$DMG_DIR/TheOpenPresenter_0.1.0_aarch64.dmg"
          fi

          echo "Rebuilding DMG at $DMG_NAME..."
          hdiutil create -volname "TheOpenPresenter" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "Signing + notarising DMG..."
          codesign --force --timestamp \
            --keychain "$KEYCHAIN" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_NAME"
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"

          security delete-keychain "$KEYCHAIN"
          echo "Done — signed, notarised, stapled."

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}${{ matrix.args }}
          path: |
            /a/TheOpenPresenter/TheOpenPresenter/tauri/target/release/bundle/nsis/TheOpenPresenter Studio_0.1.0_x64-setup.exe
            /a/TheOpenPresenter/TheOpenPresenter/tauri/target/release/bundle/msi/TheOpenPresenter Studio_0.1.0_x64_en-US.msi
            /Users/runner/work/TheOpenPresenter/TheOpenPresenter/tauri/target/release/bundle/dmg/TheOpenPresenter Studio_0.1.0_aarch64.dmg
            /Users/runner/work/TheOpenPresenter/TheOpenPresenter/tauri/target/release/bundle/dmg/TheOpenPresenter Studio_0.1.0_x64.dmg
            /Users/runner/work/TheOpenPresenter/TheOpenPresenter/tauri/target/release/bundle/macos/TheOpenPresenter Studio.app

  # Installs the real Windows artifact, launches it, and test for port 5678
  smoke-test-windows:
    name: Smoke test (Windows install + boot)
    needs: build
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-latest
          path: artifact

      - name: Install silently
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path artifact -Recurse -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) { Write-Error 'MSI not found in artifact'; exit 1 }
          Write-Host "Installing $($msi.FullName)"
          $log = Join-Path $env:RUNNER_TEMP 'msi-install.log'
          $p = Start-Process msiexec.exe `
            -ArgumentList '/i', "`"$($msi.FullName)`"", '/quiet', '/norestart', '/l*v', "`"$log`"" `
            -PassThru -Wait
          Write-Host "msiexec exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            Write-Host '----- msi install log -----'; if (Test-Path $log) { Get-Content $log }
            Write-Error "MSI install failed ($($p.ExitCode))"; exit 1
          }

      - name: Launch app and wait for port 5678
        shell: pwsh
        run: |
          $roots = @(
            "$env:ProgramFiles\TheOpenPresenter Studio",
            "${env:ProgramFiles(x86)}\TheOpenPresenter Studio",
            "$env:LOCALAPPDATA\Programs\TheOpenPresenter Studio"
          )
          $exe = $null
          foreach ($r in $roots) {
            if (Test-Path $r) {
              $exe = Get-ChildItem -Path $r -Filter '*.exe' -File |
                Where-Object { $_.Name -like 'TheOpenPresenter*' -and $_.Name -notlike 'Uninstall*' } |
                Select-Object -First 1
              if ($exe) { break }
            }
          }
          if (-not $exe) { Write-Error 'Installed app exe not found'; exit 1 }
          Write-Host "Found app at $($exe.FullName)"
          $root = $exe.Directory.FullName
          $node = Join-Path $root 'node.exe'
          $server = Join-Path $root 'node-server\run_server.mjs'
          if (-not (Test-Path $node))   { Write-Error "Bundled node.exe not found at $node"; exit 1 }
          if (-not (Test-Path $server)) { Write-Error "run_server.mjs not found at $server"; exit 1 }

          $u = 'topsmoke'
          $pw = 'Sm0ke!Test#2026'
          if (-not (Get-LocalUser -Name $u -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $u -Password (ConvertTo-SecureString $pw -AsPlainText -Force) `
              -AccountNeverExpires -PasswordNeverExpires -UserMayNotChangePassword | Out-Null
          }
          Add-LocalGroupMember -Group 'Users' -Member $u -ErrorAction SilentlyContinue

          $dir = 'C:\smoke'
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          icacls $dir /grant '*S-1-1-0:(OI)(CI)F' | Out-Null
          $out = Join-Path $dir 'app-out.log'
          $wrapper = Join-Path $dir 'launch.cmd'
          "`"$node`" `"$server`" > `"$out`" 2>&1" | Out-File -FilePath $wrapper -Encoding ascii
          New-Item -ItemType File -Path $out -Force | Out-Null

          $ru = "$env:COMPUTERNAME\$u"
          $sid = (New-Object System.Security.Principal.NTAccount($ru)).Translate([System.Security.Principal.SecurityIdentifier]).Value
          $inf = Join-Path $dir 'secpol.inf'
          $sdb = Join-Path $dir 'secpol.sdb'
          secedit /export /cfg $inf /areas USER_RIGHTS | Out-Null
          $cfg = Get-Content $inf
          if ($cfg -match '^SeBatchLogonRight') {
            $cfg = $cfg -replace '^(SeBatchLogonRight\s*=.*)$', "`$1,*$sid"
          } else {
            $cfg = $cfg -replace '^(\[Privilege Rights\])$', "`$1`r`nSeBatchLogonRight = *$sid"
          }
          Set-Content -Path $inf -Value $cfg -Encoding Unicode
          secedit /configure /db $sdb /cfg $inf /areas USER_RIGHTS | Out-Null

          $taskName = 'TopSmoke'
          # schtasks (not Register-ScheduledTask): with /ru /rp it auto-grants the
          # "log on as a batch job" right and is the most reliable way to run as
          # another account non-interactively on the runner. $wrapper has no
          # spaces (C:\smoke\...), so /tr needs no inner quoting.
          schtasks /create /tn $taskName /tr "cmd /c $wrapper" /sc once /st 00:00 /ru $ru /rp $pw /rl limited /f
          if ($LASTEXITCODE -ne 0) { Write-Error "schtasks /create failed ($LASTEXITCODE)"; exit 1 }
          schtasks /run /tn $taskName
          if ($LASTEXITCODE -ne 0) { Write-Error "schtasks /run failed ($LASTEXITCODE)"; exit 1 }

          # Report task status so a launch failure is visible even if the task
          # never writes to the log. Last Result 0x0 = ok; 0x41303 = not yet run;
          # anything else points at why cmd/node didn't start.
          Start-Sleep -Seconds 8
          Write-Host '----- task status -----'
          schtasks /query /tn $taskName /v /fo LIST | Select-String 'Status:|Last Result:|Run As User:'

          # First boot extracts + initialises embedded Postgres, so give it time.
          $ok = $false
          foreach ($i in 1..90) {
            try {
              Invoke-WebRequest http://localhost:5678 -UseBasicParsing -TimeoutSec 2 | Out-Null
              $ok = $true; break
            } catch { Start-Sleep -Seconds 2 }
          }

          # Teardown so the step returns cleanly.
          Write-Host '----- final task status -----'
          schtasks /query /tn $taskName /v /fo LIST | Select-String 'Status:|Last Result:'
          schtasks /end /tn $taskName 2>$null
          schtasks /delete /tn $taskName /f 2>$null
          Get-Process node,postgres -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Remove-LocalUser -Name $u -ErrorAction SilentlyContinue

          Write-Host '----- app output -----'; if (Test-Path $out) { Get-Content $out }

          if (-not $ok) { Write-Error 'App did not open port 5678 within timeout'; exit 1 }
          Write-Host 'Smoke test passed: port 5678 responded.'

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Update Nightly Release
        uses: andelf/nightly-release@main
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: 'TheOpenPresenter Studio Nightly Release $$'
          prerelease: true
          body: 'This is a nightly release of TheOpenPresenter Studio. Please use with caution.'
          files: |
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.exe
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.msi
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.dmg
      - name: Release Tag
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.exe
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.msi
            /home/runner/work/TheOpenPresenter/TheOpenPresenter/artifacts/**/*.dmg