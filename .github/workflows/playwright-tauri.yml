name: Playwright Tauri Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            tauri/yarn.lock
            tauri/node-server/yarn.lock

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb

      - name: Install dumbpipe
        run: |
          curl -sL https://www.dumbpipe.dev/install.sh | sh
          sudo mv dumbpipe /usr/local/bin/

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Build TOP project
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
        run: |
          cp .env.ci .env
          yarn --no-immutable
          yarn build

      - name: Build Tauri (debug)
        run: |
          cd tauri
          yarn --no-immutable
          yarn prebuild
          yarn tauri build --debug --no-bundle

      - name: Install Playwright browsers
        run: yarn e2e playwright install --with-deps

      - name: Start Tauri app
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          # Setup Cloudflared (Tunnel for testing PPT)
          cloudflared tunnel --url http://localhost:5678 > /tmp/cloudflared.log 2>&1 &
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          if [ -z "$TUNNEL_URL" ]; then echo "Failed to obtain cloudflared URL"; cat /tmp/cloudflared.log; exit 1; fi
          echo "Public ROOT_URL: $TUNNEL_URL"
          ENABLE_E2E_COMMANDS=1 \
          ROOT_URL=$TUNNEL_URL \
          DISPLAY=:99 \
            tauri/target/debug/theopenpresenter-app &
          echo "Waiting for server to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:5678 >/dev/null 2>&1; do sleep 2; done'
          echo "Server is ready!"

      - name: Run Playwright tests
        run: yarn e2e test --config playwright.tauri.config.ts

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-tauri-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 30
