name: Desktop Screen App — Build & Release

on:
  push:
    branches: [main]
    tags: ['desktop-screen-v*']
  pull_request:
    paths:
      - 'native-apps/desktop-screen/**'
      - '.github/workflows/desktop-screen.yml'
  workflow_dispatch:

concurrency:
  group: desktop-screen-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
          - label: linux-aarch64
            runner: ubuntu-22.04-arm

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: native-apps/desktop-screen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: native-apps/desktop-screen/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-apps/desktop-screen/src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config \
            file

      - name: npm ci
        run: npm ci --no-audit --no-fund

      # `--no-bundle` skips deb/AppImage/rpm packaging; we only ship the
      # raw binary because `install.sh` downloads a single executable.
      - name: tauri build
        run: npm run tauri build -- --no-bundle --verbose

      - name: Stage binary as desktop-screen-${{ matrix.label }}
        run: |
          src="src-tauri/target/release/desktop-screen"
          out="desktop-screen-${{ matrix.label }}"
          install -m 0755 "$src" "$out"
          ls -la "$out"
          file "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-screen-${{ matrix.label }}
          path: native-apps/desktop-screen/desktop-screen-${{ matrix.label }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Nightly release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: desktop-screen-nightly
          name: 'Desktop Screen Nightly $$'
          prerelease: true
          body: 'Nightly build of TheOpenPresenter Desktop Screen. Use with caution.'
          files: |
            artifacts/desktop-screen-linux-x86_64
            artifacts/desktop-screen-linux-aarch64

      - name: Tagged release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/desktop-screen-linux-x86_64
            artifacts/desktop-screen-linux-aarch64
