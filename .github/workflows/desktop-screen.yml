name: Desktop Screen App — Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'native-apps/desktop-screen/**'
      - '.github/workflows/desktop-screen.yml'
  workflow_dispatch:

concurrency:
  group: desktop-screen-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            tauri_args: --no-bundle
          - label: linux-aarch64
            runner: ubuntu-22.04-arm
            tauri_args: --no-bundle

          - label: windows-x86_64
            runner: windows-latest
            tauri_args: ''

          - label: macos-aarch64
            runner: macos-14
            tauri_args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - label: macos-x86_64
            runner: macos-14
            tauri_args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: native-apps/desktop-screen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: native-apps/desktop-screen/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-apps/desktop-screen/src-tauri

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config \
            file

      - name: npm ci
        run: npm ci --no-audit --no-fund

      # Linux: `--no-bundle` skips deb/AppImage/rpm packaging — install.sh
      # downloads a single binary.
      # Windows / macOS: default bundle (NSIS+MSI / DMG+.app respectively).
      - name: tauri build
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- ${{ matrix.tauri_args }} --verbose

      - name: Stage outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          case "${{ matrix.label }}" in
            linux-*)
              cp src-tauri/target/release/desktop-screen \
                "out/desktop-screen-${{ matrix.label }}"
              chmod +x "out/desktop-screen-${{ matrix.label }}"
              ;;
            windows-x86_64)
              # NSIS one-file installer.
              cp src-tauri/target/release/bundle/nsis/*-setup.exe \
                out/desktop-screen-windows-x86_64-setup.exe
              # MSI for enterprise / Group Policy deploy.
              cp src-tauri/target/release/bundle/msi/*.msi \
                out/desktop-screen-windows-x86_64.msi
              ;;
            macos-aarch64)
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
                out/desktop-screen-macos-aarch64.dmg
              ;;
            macos-x86_64)
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg \
                out/desktop-screen-macos-x86_64.dmg
              ;;
          esac
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-screen-${{ matrix.label }}
          path: native-apps/desktop-screen/out/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Nightly release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: desktop-screen-nightly
          name: 'Desktop Screen Nightly $$'
          prerelease: true
          body: 'Nightly build of TheOpenPresenter Desktop Screen. Use with caution.'
          files: |
            artifacts/desktop-screen-*

      - name: Tagged release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/desktop-screen-*
